<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego del Espía PRO</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}
.pantalla{ display:none; margin-top:20px; }

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#ff9800;
    color:white;
}

input, select{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:none;
}

input[type="number"]{
    width:70px;
    text-align:center;
}

#rolBox{
    font-size:22px;
    margin:20px;
    padding:20px;
    background:white;
    color:black;
    border-radius:10px;
    display:inline-block;
    white-space:pre-line;
}

#timer{ font-size:28px; margin-top:15px; }

.jugadorCard{
    background:white;
    color:black;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

@keyframes victoriaAnim {
    0% { transform: scale(0.5); opacity:0; }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); opacity:1; }
}

.victoriaActiva{
    animation: victoriaAnim 0.6s ease;
}
</style>
</head>

<!-- CONFIG 1 -->
<div id="config1" class="pantalla" style="display:block;">
<h2>Cantidad</h2>

Jugadores:
<button onclick="cambiarJugadores(-1)">-</button>
<input type="number" id="cantidad" min="3" max="24" value="4" onblur="validarJugadores()">

Impostores:

</div>

<!-- CONFIG 2 -->
<div id="config2" class="pantalla">
<h2>Nombres de los jugadores</h2>

/* ===== CONTROL JUGADORES ===== */

function cambiarJugadores(valor){
    let input = document.getElementById("cantidad");
    let numero = Number(input.value);

    if (!numero) numero = 3;

    numero += valor;

    if (numero < 3) numero = 3;
    if (numero > 24) numero = 24;

    input.value = numero;

    validarImpostores();
}

function validarJugadores(){
    let input = document.getElementById("cantidad");
    let numero = Number(input.value);

    if (!numero || numero < 3) numero = 3;
    if (numero > 24) numero = 24;

    input.value = numero;

    validarImpostores();
}

/* ===== CONTROL IMPOSTORES ===== */

function cambiarImpostores(valor){
    let input = document.getElementById("cantidadImpostores");
    let jugadores = Number(document.getElementById("cantidad").value);
    let numero = Number(input.value);

    if (!numero) numero = 1;

    numero += valor;

    let maxImp = Math.floor((jugadores - 1) / 2);
    if (maxImp < 1) maxImp = 1;

    if (numero < 1) numero = 1;
    if (numero > maxImp) numero = maxImp;

    input.value = numero;
}

function validarImpostores(){
    let input = document.getElementById("cantidadImpostores");
    let jugadores = Number(document.getElementById("cantidad").value);
    let numero = Number(input.value);

    let maxImp = Math.floor((jugadores - 1) / 2);
    if (maxImp < 1) maxImp = 1;

    if (!numero || numero < 1) numero = 1;
    if (numero > maxImp) numero = maxImp;

    input.value = numero;
}
/* IR A NOMBRES */
function irANombres(){

    let cantidad = parseInt(document.getElementById("cantidad").value);
    let cantImp = parseInt(document.getElementById("cantidadImpostores").value);

    if(cantImp>=cantidad-cantImp){
        error.innerText="Los impostores deben ser menos que los civiles.";
        return;
    }

    document.getElementById("config1").style.display="none";
    document.getElementById("config2").style.display="block";

    let cont=document.getElementById("nombres");
    cont.innerHTML="";

    for(let i=0;i<cantidad;i++){
        cont.innerHTML+=`<input type="text" placeholder="Nombre jugador ${i+1}" id="nombre${i}"><br>`;
    }
}

/* INICIAR JUEGO */
function iniciarJuego(){

    let cantidad = parseInt(document.getElementById("cantidad").value);
    let cantImp = parseInt(document.getElementById("cantidadImpostores").value);

    jugadores=[];
    impostores=[];
    civiles=[];
    juegoTerminado=false;
    tiempo=240;

    let randomCat=categorias[Math.floor(Math.random()*categorias.length)];
    palabraReal=randomCat.real;
    palabraPista=randomCat.pista;

    for(let i=0;i<cantidad;i++){
        let nombre=document.getElementById("nombre"+i).value||"Jugador "+(i+1);
        jugadores.push({nombre:nombre,vivo:true});
    }

    while(impostores.length<cantImp){
        let r=Math.floor(Math.random()*cantidad);
        if(!impostores.includes(r)){
            impostores.push(r);
        }
    }

    civiles=jugadores.map((_,i)=>i).filter(i=>!impostores.includes(i));

    document.getElementById("config2").style.display="none";
    document.getElementById("roles").style.display="block";

    indiceJugador=0;
    mostrarJugador();
}

function mostrarJugador(){
    document.getElementById("jugadorActual").innerText=jugadores[indiceJugador].nombre;
    document.getElementById("rolBox").innerText="Toca para ver tu rol";
    document.getElementById("btnVerRol").style.display="inline-block";
    document.getElementById("btnSiguiente").style.display="none";
}

function verRol(){
    if(impostores.includes(indiceJugador)){
        document.getElementById("rolBox").innerText="Eres IMPOSTOR 😈\nPalabra: "+palabraPista;
    } else {
        document.getElementById("rolBox").innerText="Eres CIVIL 😀\nPalabra: "+palabraReal;
    }

    document.getElementById("btnVerRol").style.display="none";
    document.getElementById("btnSiguiente").style.display="inline-block";
}

function siguienteJugador(){
    indiceJugador++;
    if(indiceJugador>=jugadores.length){
        document.getElementById("roles").style.display="none";
        document.getElementById("partida").style.display="block";
        elegirCivilQueEmpieza();
        iniciarTimer();
    } else {
        mostrarJugador();
    }
}

/* TIMER */
function iniciarTimer(){
    actualizarTimer();
    intervalo=setInterval(()=>{
        if(tiempo<=0){
            clearInterval(intervalo);
            abrirVotacion();
        } else{
            tiempo--;
            actualizarTimer();
        }
    },1000);
}

function actualizarTimer(){
    let min=Math.floor(tiempo/60);
    let seg=tiempo%60;

    document.getElementById("timer").innerText=
    (min<10?"0":"")+min+":"+(seg<10?"0":"")+seg;

    if(tiempo<=30){
        document.getElementById("timer").style.color="red";
    } else{
        document.getElementById("timer").style.color="white";
    }
}

/* VOTACION */
function abrirVotacion(){

    clearInterval(intervalo);
    document.getElementById("partida").style.display="none";
    document.getElementById("votacion").style.display="block";

    document.getElementById("resultado").innerText="";

    let lista=document.getElementById("listaVotos");
    lista.innerHTML="";
  
  document.getElementById("btnFinalizar").style.display = "inline-block";

    jugadores.forEach((j,i)=>{
        if(j.vivo){
            lista.innerHTML+=`
            <div class="jugadorCard">
                <b>${j.nombre}</b><br>
                <select id="voto${i}">
                    <option value="nadie">Nadie</option>
                    ${jugadores.map((j2,k)=> 
                        j2.vivo && k!==i ? `<option value="${k}">${j2.nombre}</option>`:""
                    ).join("")}
                </select>
            </div>`;
        }
    });
}

/* RESULTADOS */
function calcularResultados(){
  
  document.getElementById("btnFinalizar").style.display = "none";
  
    let conteo={};

    jugadores.forEach((j,i)=>{
        if(j.vivo){
            let voto=document.getElementById("voto"+i).value;
            conteo[voto]=(conteo[voto]||0)+1;
        }
    });

    let maxVotos=0;
    let ganador=null;
    let empate=false;

    for(let opcion in conteo){
        if(conteo[opcion]>maxVotos){
            maxVotos=conteo[opcion];
            ganador=opcion;
            empate=false;
        } else if(conteo[opcion]===maxVotos){
            empate=true;
        }
    }

    let resultado=document.getElementById("resultado");

    if(empate){
        resultado.innerText="EMPATE. Nadie eliminado.";
    }
    else if(ganador==="nadie"){
        resultado.innerText="La mayoría votó NADIE.";
    }
    else{
        jugadores[ganador].vivo=false;
        if(impostores.includes(parseInt(ganador))){
            resultado.innerText=jugadores[ganador].nombre+" era IMPOSTOR 😈";
        } else{
            resultado.innerText=jugadores[ganador].nombre+" era CIVIL 😀";
        }
    }

    verificarFin();
}

        let nombresCiviles = civiles.map(i => jugadores[i].nombre).join(", ");

        document.getElementById("resultado").innerText += 
        "\n🎉 GANAN LOS CIVILES" +
        "\nCiviles: " + nombresCiviles +
        "\nPalabra: " + palabraReal;

        juegoTerminado = true;  
        sonidoVictoria.play();  
        document.getElementById("votacion").classList.add("victoriaActiva");  
        document.getElementById("btnSeguir").innerText = "Nueva Partida";
    }  

    else if(
        vivosImp > vivosCiv || 
        (vivosImp === 1 && vivosCiv === 1)
    ){  

        let nombresImpostores = impostores.map(i => jugadores[i].nombre).join(", ");

        document.getElementById("resultado").innerText += 
        "\n😈 GANAN LOS IMPOSTORES" +
        "\nImpostores: " + nombresImpostores +
        "\nPalabra real: " + palabraReal;

        juegoTerminado = true;  
        sonidoVictoria.play();  
        document.getElementById("votacion").classList.add("victoriaActiva");
  
        document.getElementById("btnSeguir").innerText = "Nueva Partida";
    }  

    document.getElementById("resultado").innerText += 
    "\nImpostores restantes: " + vivosImp;  
}
  
function seguirJuego(){  
    if(juegoTerminado){  
        location.reload();  
        return;  
    }  
    document.getElementById("votacion").style.display="none";  
    document.getElementById("partida").style.display="block";  
    iniciarTimer();  
}  

function elegirCivilQueEmpieza(){

    // Sacamos solo los civiles vivos
    let civilesVivos = civiles.filter(i => jugadores[i].vivo);

    if(civilesVivos.length === 0) return;

    // Elegimos uno al azar
    let indiceRandom = Math.floor(Math.random() * civilesVivos.length);
    let jugadorQueEmpieza = civilesVivos[indiceRandom];

    document.getElementById("resultado").innerHTML =
    "<h3>🎤 Empieza hablando: " +
    jugadores[jugadorQueEmpieza].nombre +
    "</h3>";
}
  
</script>
