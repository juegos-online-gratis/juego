<html lang="es">

  <meta charset="UTF-8">

<title>Juego del Espía PRO</title>

<style>
body{
    color: white;
    margin: 0;
    min-height: 100vh;
    text-align: center;
    
    background: linear-gradient(-45deg, #000000, #071a2f, #0b2c55, #000000);
    background-size: 400% 400%;
    animation: fondoAnimado 14s ease infinite;
}

@keyframes fondoAnimado{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
}

@keyframes fondoAnimado{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
}
.pantalla{ display:none; margin-top:20px; }

button{
    padding:12px 22px;
    margin:10px;
    font-size:17px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: linear-gradient(45deg,#ff9800,#ffb74d);
    color:white;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:all 0.15s ease;
}

button:active{
    transform:scale(0.93);
    box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

button:active{
    transform:scale(0.93);
    box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

input, select{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:none;
}

input[type="number"]{
    width:70px;
    text-align:center;
}

#rolBox{
    font-size:24px;
    margin:25px;
    padding:25px;
    background:white;
    color:black;
    border-radius:15px;
    display:inline-block;
    white-space:pre-line;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    animation:popRol 0.4s ease;
}

@keyframes popRol{
    from{ transform:scale(0.6); opacity:0;}
    to{ transform:scale(1); opacity:1;}
}

#timer{ font-size:28px; margin-top:15px; }

..jugadorCard{
    background:white;
    color:black;
    padding:15px;
    margin:12px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition:transform 0.2s;
}

.jugadorCard:hover{
    transform:scale(1.02);
}

@keyframes victoriaAnim {
    0% { transform: scale(0.5); opacity:0; }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); opacity:1; }
}

.victoriaActiva{
    animation: victoriaAnim 0.6s ease;
}


#turnoInicio{
    text-align:center;
    color:white;
    font-size:22px;
    opacity:0;
    transition: opacity 1s ease;
}
.contenedor{
    width: 90%;
    max-width: 400px;
    margin: 0 auto;   /* centra horizontal */
    padding-top: 40px;
}
.fila{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 15px 0;
}
.categoriaBtn{
    background: gray;
}

.categoriaActiva{
    background: linear-gradient(45deg,#ff9800,#ffb74d);
}
</style>
</head>
<body>
<div class="contenedor">

<h1>🕵️ Juego del Espía</h1>

<!-- CONFIG 1 -->
<div id="config1" class="pantalla" style="display:block;">
<h2>Cantidad</h2>

Jugadores:
<button onclick="playClick(); cambiarJugadores(-1)">-</button>
<input type="number" id="cantidad" min="3" max="24" value="4" onblur="validarJugadores()">
<button onclick="playClick(); cambiarJugadores(1)">+</button>
<br><br>

Impostores:
<button onclick="playClick(); cambiarImpostores(-1)">-</button>
<input type="number" id="cantidadImpostores" min="1" value="1" onblur="validarImpostores()">
<button onclick="playClick(); cambiarImpostores(1)">+</button>

<button onclick="playClick(); irACategorias()">Continuar</button>
<p id="errorConfig" style="color:yellow;"></p>
</div>

<!-- CATEGORIAS -->
<div id="configCategorias" class="pantalla">
  <h2>Selecciona Categorías</h2>
  <div id="listaCategorias"></div>
  <br>
  <button onclick="playClick(); irANombres()">Continuar</button>
</div>

<!-- CONFIG 2 -->
<div id="config2" class="pantalla">
<h2>Nombres de los jugadores</h2>
<div id="nombres"></div>
<button onclick="playClick(); iniciarJuego()">Comenzar Juego</button>
</div>

<!-- ROLES -->
<div id="roles" class="pantalla">
<h2 id="jugadorActual"></h2>
<div id="rolBox">Toca para ver tu rol</div><br>
<button id="btnVerRol" onclick="playClick(); verRol()">Ver Rol</button>
<button onclick="playClick(); siguienteJugador()" id="btnSiguiente" style="display:none;">Siguiente</button>
</div>

<!-- PARTIDA -->
<div id="partida" class="pantalla">
<h2 id="turnoInicio" style="text-align:center; color:white;"></h2>
<h2>Tiempo restante</h2>
<div id="timer">04:00</div>
<button onclick="playClick(); abrirVotacion()">Iniciar Votación</button>
</div>

<!-- VOTACION -->
<div id="votacion" class="pantalla">
<h2>Votación</h2>
<div id="listaVotos"></div>
<button id="btnFinalizar" onclick="playClick(); calcularResultados()">Finalizar Votación</button>
<h3 id="resultado"></h3>
<button id="btnSeguir" onclick="playClick(); seguirJuego()">
    Seguir Jugando
</button>
</div>

/* ===== CONTROL JUGADORES ===== */

function cambiarJugadores(valor){
    let input = document.getElementById("cantidad");
    let numero = Number(input.value);

    if (!numero) numero = 3;

    numero += valor;

    if (numero < 3) numero = 3;
    if (numero > 24) numero = 24;

    input.value = numero;

    validarImpostores();
}

function validarJugadores(){
    let input = document.getElementById("cantidad");
    let numero = Number(input.value);

    if (!numero || numero < 3) numero = 3;
    if (numero > 24) numero = 24;

    input.value = numero;

    validarImpostores();
}

/* ===== CONTROL IMPOSTORES ===== */

function cambiarImpostores(valor){
    let input = document.getElementById("cantidadImpostores");
    let jugadores = Number(document.getElementById("cantidad").value);
    let numero = Number(input.value);

    if (!numero) numero = 1;

    numero += valor;

    let maxImp = Math.floor((jugadores - 1) / 2);
    if (maxImp < 1) maxImp = 1;

    if (numero < 1) numero = 1;
    if (numero > maxImp) numero = maxImp;

    input.value = numero;
}

function validarImpostores(){
    let input = document.getElementById("cantidadImpostores");
    let jugadores = Number(document.getElementById("cantidad").value);
    let numero = Number(input.value);

    let maxImp = Math.floor((jugadores - 1) / 2);
    if (maxImp < 1) maxImp = 1;

    if (!numero || numero < 1) numero = 1;
    if (numero > maxImp) numero = maxImp;

    input.value = numero;
}
function irACategorias(){

    document.getElementById("config1").style.display="none";
    document.getElementById("configCategorias").style.display="block";

    let cont = document.getElementById("listaCategorias");
    cont.innerHTML = "";

    categoriasActivas = [];

    for(let nombre in categorias){

        let btn = document.createElement("button");
        btn.innerText = nombre;
        btn.classList.add("categoriaBtn");

        btn.onclick = function(){
            toggleCategoria(nombre, btn);
        };

        cont.appendChild(btn);
    }
}

function toggleCategoria(nombre, boton){

    if(categoriasActivas.includes(nombre)){

        categoriasActivas =
            categoriasActivas.filter(c => c !== nombre);

        boton.classList.remove("categoriaActiva");
        boton.classList.add("categoriaBtn");

    }else{

        categoriasActivas.push(nombre);

        boton.classList.remove("categoriaBtn");
        boton.classList.add("categoriaActiva");
    }

}

/* INICIAR JUEGO */
function iniciarJuego(){

    detenerMusica();

    let cantidad = parseInt(document.getElementById("cantidad").value);
    let cantImp = parseInt(document.getElementById("cantidadImpostores").value);
  

    jugadores=[];
    impostores=[];
    civiles=[];
    juegoTerminado=false;
    tiempo=240;

let todasLasPalabras = [];

// Si no eligieron ninguna, usar todas
if(categoriasActivas.length === 0){

    for (let nombre in categorias) {
        todasLasPalabras =
            todasLasPalabras.concat(categorias[nombre]);
    }

}else{

    categoriasActivas.forEach(nombre=>{
        todasLasPalabras =
            todasLasPalabras.concat(categorias[nombre]);
    });

}
let randomCat = todasLasPalabras[
    Math.floor(Math.random() * todasLasPalabras.length)
];
    palabraReal=randomCat.real;
    palabraPista=randomCat.pista;

    for(let i=0;i<cantidad;i++){
        let nombre=document.getElementById("nombre"+i).value||"Jugador "+(i+1);
        jugadores.push({nombre:nombre,vivo:true});
    }

    while(impostores.length<cantImp){
        let r=Math.floor(Math.random()*cantidad);
        if(!impostores.includes(r)){
            impostores.push(r);
        }
    }

    civiles=jugadores.map((_,i)=>i).filter(i=>!impostores.includes(i));

    document.getElementById("config2").style.display="none";
    document.getElementById("roles").style.display="block";

    indiceJugador=0;
    mostrarJugador();
}

function mostrarJugador(){
    document.getElementById("jugadorActual").innerText=jugadores[indiceJugador].nombre;
    document.getElementById("rolBox").innerText="Toca para ver tu rol";
    document.getElementById("btnVerRol").style.display="inline-block";
    document.getElementById("btnSiguiente").style.display="none";
}

function verRol(){
    if(impostores.includes(indiceJugador)){
        document.getElementById("rolBox").innerText="Eres IMPOSTOR 😈\nPalabra: "+palabraPista;
    } else {
        document.getElementById("rolBox").innerText="Eres CIVIL 😀\nPalabra: "+palabraReal;
    }

    document.getElementById("btnVerRol").style.display="none";
    document.getElementById("btnSiguiente").style.display="inline-block";
}

function siguienteJugador(){
    indiceJugador++;
    if(indiceJugador>=jugadores.length){
        document.getElementById("roles").style.display="none";
        document.getElementById("partida").style.display="block";
        elegirCivilQueEmpieza();
        iniciarMusica();
        iniciarTimer();
    } else {
        mostrarJugador();
    }
}

/* TIMER */
function iniciarTimer(){
    actualizarTimer();
    intervalo=setInterval(()=>{
        if(tiempo<=0){
            clearInterval(intervalo);
            abrirVotacion();
        } else{
            tiempo--;
            actualizarTimer();
        }
    },1000);
}

function actualizarTimer(){
    let min=Math.floor(tiempo/60);
    let seg=tiempo%60;

    document.getElementById("timer").innerText=
    (min<10?"0":"")+min+":"+(seg<10?"0":"")+seg;

    if(tiempo<=30){
        document.getElementById("timer").style.color="red";
    } else{
        document.getElementById("timer").style.color="white";
    }
}

/* VOTACION */
function abrirVotacion(){

    clearInterval(intervalo);
    document.getElementById("partida").style.display="none";
    document.getElementById("votacion").style.display="block";

    document.getElementById("resultado").innerText="";

    let lista=document.getElementById("listaVotos");
    lista.innerHTML="";
  
  document.getElementById("btnFinalizar").style.display = "inline-block";

    jugadores.forEach((j,i)=>{
        if(j.vivo){
            lista.innerHTML+=`
            <div class="jugadorCard">
                <b>${j.nombre}</b><br>
                <select id="voto${i}">
                    <option value="nadie">Nadie</option>
                    ${jugadores.map((j2,k)=> 
                        j2.vivo && k!==i ? `<option value="${k}">${j2.nombre}</option>`:""
                    ).join("")}
                </select>
            </div>`;
        }
    });
}

/* RESULTADOS */
function calcularResultados(){

  document.getElementById("btnFinalizar").style.display = "none";
  
    let conteo={};

    jugadores.forEach((j,i)=>{
        if(j.vivo){
            let voto=document.getElementById("voto"+i).value;
            conteo[voto]=(conteo[voto]||0)+1;
        }
    });

    let maxVotos=0;
    let ganador=null;
    let empate=false;

    for(let opcion in conteo){
        if(conteo[opcion]>maxVotos){
            maxVotos=conteo[opcion];
            ganador=opcion;
            empate=false;
        } else if(conteo[opcion]===maxVotos){
            empate=true;
        }
    }

    let resultado=document.getElementById("resultado");

    if(empate){
        resultado.innerText="EMPATE. Nadie eliminado.";
    }
    else if(ganador==="nadie"){
        resultado.innerText="La mayoría votó NADIE.";
    }
    else{
        jugadores[ganador].vivo=false;
        if(impostores.includes(parseInt(ganador))){
            resultado.innerText=jugadores[ganador].nombre+" era IMPOSTOR 😈";
        } else{
            resultado.innerText=jugadores[ganador].nombre+" era CIVIL 😀";
        }
    }

    verificarFin();
}

function verificarFin(){  

    let vivosImp = impostores.filter(i => jugadores[i].vivo).length;  
    let vivosCiv = civiles.filter(i => jugadores[i].vivo).length;  

    if(vivosImp === 0){

        playVictoria()


        let nombresCiviles = civiles.map(i => jugadores[i].nombre).join(", ");

        document.getElementById("resultado").innerText += 
        "\n🎉 GANAN LOS CIVILES" +
        "\nCiviles: " + nombresCiviles +
        "\nPalabra: " + palabraReal;

        juegoTerminado = true;  
        document.getElementById("votacion").classList.add("victoriaActiva");  
        document.getElementById("btnSeguir").innerText = "Nueva Partida";
    }  

    else if(
        vivosImp > vivosCiv || 
        (vivosImp === 1 && vivosCiv === 1)
    ){ 

        playDerrota()

    

        let nombresImpostores = impostores.map(i => jugadores[i].nombre).join(", ");

        document.getElementById("resultado").innerText += 
        "\n😈 GANAN LOS IMPOSTORES" +
        "\nImpostores: " + nombresImpostores +
        "\nPalabra real: " + palabraReal;

        juegoTerminado = true;   
        document.getElementById("votacion").classList.add("victoriaActiva");
  
        document.getElementById("btnSeguir").innerText = "Nueva Partida";
    }  

    document.getElementById("resultado").innerText += 
    "\nImpostores restantes: " + vivosImp;  
}
  
function seguirJuego(){  
    if(juegoTerminado){  
        location.reload();  
        return;  
    }  
    document.getElementById("votacion").style.display="none";  
    document.getElementById("partida").style.display="block";  
    iniciarTimer();  
}  

  function elegirCivilQueEmpieza(){

    let civilesVivos = civiles.filter(i => jugadores[i].vivo);
    if(civilesVivos.length === 0) return;

    let indiceRandom = Math.floor(Math.random() * civilesVivos.length);
    let jugadorQueEmpieza = civilesVivos[indiceRandom];

    let elemento = document.getElementById("turnoInicio");

    elemento.innerHTML =
        "🎤 <b>Empieza hablando:</b><br>" +
        jugadores[jugadorQueEmpieza].nombre;

    // Forzar visible
    elemento.style.opacity = "1";

    // Después de 4 segundos empieza a desvanecerse
    setTimeout(()=>{
        elemento.style.opacity = "0";

        // Después de que termina la transición lo borramos
        setTimeout(()=>{
            elemento.innerHTML="";
        },1000);

    },4000);
}
